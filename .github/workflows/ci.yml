# 合并/推送时：后端语法检查、前台与管理端生产构建、本机起 API 跑 publish_smoke 子集
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  docs-markdown:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Markdown lint（docs/，排除 ._）
        run: npx --yes markdownlint-cli2@latest "docs/**/*.md" "!**/._*"

  backend-py-compile:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      - name: py_compile（排除 macOS AppleDouble 的 ._*.py）
        run: find app -name '*.py' ! -name '._*' -print0 | xargs -0 python -m py_compile
      - name: AI SEO build_snapshots 结构验收（P-DOC-01）
        run: PYTHONPATH=. python scripts/ai_insight_snapshots_acceptance.py
      - name: 发布环境自检脚本（默认非 production，SEC/DB 烟测）
        run: PYTHONPATH=. python scripts/verify_release_env.py

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build

  admin-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: admin/package-lock.json
      - run: npm ci
      - run: npm run build

  api-smoke:
    runs-on: ubuntu-latest
    needs: [backend-py-compile]
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      - name: 启动 uvicorn 并执行 publish_smoke.sh
        run: |
          python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 &
          for i in $(seq 1 40); do
            if curl -sf "http://127.0.0.1:8000/api/tools" >/dev/null; then
              break
            fi
            sleep 1
          done
          BASE_URL=http://127.0.0.1:8000 bash scripts/publish_smoke.sh
